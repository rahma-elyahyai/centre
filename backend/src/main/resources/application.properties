# ═══════════════════════════════════════════════════════════
# Warriors Centre — application.properties (version propre)
# ═══════════════════════════════════════════════════════════

# ─── Application ──────────────────────────────────────────
spring.application.name=warriors-centre

# ─── Serveur ──────────────────────────────────────────────
server.port=8080
server.address=0.0.0.0

# ─── Base de données PostgreSQL ───────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/academy_db
spring.datasource.username=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
# hibernate.dialect n'est plus necessaire avec Hibernate 6 (auto-detecte)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Encodage HTTP ────────────────────────────────────────
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
# !! NE PAS mettre spring.mandatory-file-encoding=UTF-8
# Windows (Cp1256) fait crasher Spring Boot au demarrage avec cette option

# ─── JWT ──────────────────────────────────────────────────
# ─── JWT ──────────────────────────────────────────────────

# ─── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:JSrsByT8PjrwVProlZTptSkRV6v7la2ot4twjIohpJ853jQOh2flv4FcqiyGZh33bNqn/3DTCKgftNqHtqTKDw==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─── Base de données ──────────────────────────────────────
spring.datasource.password=${DB_PASSWORD:postgres123}
# ─── Upload fichiers ──────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.sql.init.mode=never
file.upload-dir=uploads/professors
file.base-url=http://localhost:8080

# ─── Logging ──────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.com.warriors.centre=DEBUG